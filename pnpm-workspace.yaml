packages:
  - mobile/
  - server/
  - web/

minRequiredVersion: 720

allowBuilds:
  '@parcel/watcher': false
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  prisma: true

overrides:
  '@hono/node-server@<1.19.13': ^1.19.13
  'uuid@<11.1.1': ^11.1.1
